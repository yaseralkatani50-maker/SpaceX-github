<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasemen Mini - SpaceX Edition Final</title>
    <style>
        :root {
            --bg: #0a0a0a; --header: #1b331b; --row: #141414;
            --accent: #ffcc00; --text: #ffffff; --border: #222;
            --name-color: #00d4ff; --danger: #c0392b; --btn-bg: #005f73;
            --locked: #1a1a1a;
            --separator: #333;
            --blue-soft: #007bff;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; margin-bottom: 10px; }
        h2 { color: var(--accent); margin: 0; font-size: 1.1rem; text-transform: uppercase; }
        .input-sesi {
            background: rgba(88, 214, 141, 0.1); border: 1px solid #27ae60;
            color: #58d68d; font-size: 0.85rem; font-weight: bold; text-align: center;
            padding: 3px 10px; border-radius: 15px; outline: none; width: 220px; margin-top: 5px;
        }
        
        .wrapper { width: 100%; max-width: 950px; border: 1px solid var(--border); overflow-x: auto; margin-bottom: 20px; position: relative;}
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; background: var(--row); table-layout: fixed; }
        
        th, td { border: 1px solid var(--border); padding: 8px 2px; text-align: center; overflow: hidden; }
        tr { border-bottom: 2px solid var(--separator); } 
        
        th { background: var(--header); color: #eee; font-size: 0.7rem; border-bottom: 2px solid var(--accent); }
        
        .td-name { text-align: left; padding: 0; width: 200px; } 
        .input-name {
            background: transparent; color: var(--name-color); border: none;
            width: 100%; padding: 6px 8px; font-weight: bold; font-size: 0.75rem;
            outline: none; box-sizing: border-box; text-overflow: ellipsis;
            text-transform: uppercase;
        }

        .col-score { width: 38px; }
        .col-total { width: 45px; }
        .col-rank { width: 35px; }

        .input-score {
            background: rgba(255,255,255,0.05); color: white; border: none;
            width: 100%; text-align: center; font-size: 0.75rem; outline: none; border-radius: 2px;
        }
        .input-kill { color: #ffcc00; }
        
        .td-readonly { 
            background: var(--locked); 
            color: #aaa; 
            font-weight: bold;
            pointer-events: none;
            user-select: none;
        }

        .total-col { font-weight: bold; color: var(--accent); background: #1a1a1a !important; font-size: 0.85rem; }
        .rank-col { font-weight: bold; font-size: 0.85rem; }
        .gold { color: #f1c40f; } .silver { color: #bdc3c7; } .bronze { color: #cd7f32; }

        .summary { width: 100%; max-width: 320px; align-self: flex-start; margin-bottom: 20px;}
        .summary table { table-layout: auto; }
        .summary table td:last-child { color: var(--accent); font-weight: bold; text-align: right; }
        
        .control-panel {
            width: 100%; max-width: 950px; display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px;
        }
        .panel-box {
            background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 15px; flex: 1; min-width: 300px;
            position: relative; /* Penting untuk posisi tombol hapus mini */
        }
        .panel-title { color: var(--name-color); font-size: 0.85rem; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Tombol Hapus Mini Biru */
        .btn-mini-clear {
            position: absolute; top: 15px; right: 15px;
            background: var(--blue-soft); color: white; border: none;
            padding: 2px 8px; font-size: 9px; border-radius: 3px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .btn-mini-clear:hover { background: #0056b3; }

        textarea { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px; box-sizing: border-box; border-radius: 4px; font-size: 0.75rem; margin-bottom: 10px; resize: vertical; }
        
        .btn-action { width: 100%; background: var(--btn-bg); color: #fff; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.8rem; text-transform: uppercase;}
        .btn-action:hover { background: var(--name-color); color: #000; }
        .btn-send { background: #27ae60; margin-top: 10px; }

        .input-panel-name { font-weight: bold; color: #fff; font-size: 0.75rem; text-align: left; padding-left: 8px; text-transform: uppercase;}
        .select-rank { width: 90%; background: #222; color: #fff; border: 1px solid #444; text-align: center; font-size: 0.75rem; padding: 4px; }
        
        .reset-btn { position: fixed; bottom: 15px; right: 15px; background: var(--danger); color: white; border: none; padding: 6px 12px; font-size: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; opacity: 0.5; z-index: 100; }
    </style>
</head>
<body>

    <div class="header">
        <h2>KLASEMEN POINT - FT BY MANK X SpaceX</h2>
        <input type="text" class="input-sesi" id="inputSesi" value="HASIL SESI" oninput="saveData()">
    </div>

    <div class="wrapper">
        <table id="mainTable">
            <thead>
                <tr>
                    <th rowspan="2" style="width: 200px;">NAMA KAPTEN / TEAM</th>
                    <th colspan="3">MATCH 1</th><th colspan="3">MATCH 2</th><th colspan="3">MATCH 3</th>
                    <th rowspan="2" class="col-total">TOT</th><th rowspan="2" class="col-rank">JR</th>
                </tr>
                <tr>
                    <th class="col-score">PL</th><th class="col-score">KL</th><th class="col-score">PT</th>
                    <th class="col-score">PL</th><th class="col-score">KL</th><th class="col-score">PT</th>
                    <th class="col-score">PL</th><th class="col-score">KL</th><th class="col-score">PT</th>
                </tr>
            </thead>
            <tbody id="teamRows"></tbody>
        </table>
    </div>

    <div class="summary">
        <table>
            <thead><tr><th colspan="2">JUARA & MOST KILL TEAM</th></tr></thead>
            <tbody>
                <tr><td>JUARA 1</td><td id="s1">-</td></tr>
                <tr><td>JUARA 2</td><td id="s2">-</td></tr>
                <tr><td>JUARA 3</td><td id="s3">-</td></tr>
                <tr><td style="color: #ff4d4d;">MOST KILL</td><td id="smk" style="color: #ff4d4d;">-</td></tr>
            </tbody>
        </table>
    </div>

    <div class="control-panel">
        <div class="panel-box">
            <button class="btn-mini-clear" onclick="document.getElementById('rawText').value = ''">Hapus</button>
            <h3 class="panel-title">1. Paste Data Pendaftaran</h3>
            <textarea id="rawText" rows="6" placeholder="Paste list di sini..."></textarea>
            <button class="btn-action" onclick="extractNames()">Filter & Masukkan Nama</button>
        </div>

        <div class="panel-box" style="flex: 2;">
            <h3 class="panel-title">2. Input Hasil Pertandingan</h3>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                <label style="font-size:0.8rem; font-weight:bold;">Kirim Ke:</label>
                <select id="targetMatch" style="padding:5px; background:#222; color:var(--accent); border:1px solid var(--accent);">
                    <option value="1">MATCH 1</option>
                    <option value="2">MATCH 2</option>
                    <option value="3">MATCH 3</option>
                </select>
            </div>
            
            <table class="input-table" id="inputTableBody" style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr>
                        <th style="width: 50%;">Nama Kapten / Team</th>
                        <th style="width: 25%;">Rank (PL)</th>
                        <th style="width: 25%;">Kill (KL)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn-action btn-send" onclick="sendToMainTable()">🚀 KIRIM DATA KE KLASEMEN</button>
        </div>
    </div>

    <button class="reset-btn" onclick="resetAllData()">Hapus Semua (Tim & Skor)</button>

    <script>
        const pointSystem = { 1:12, 2:9, 3:8, 4:7, 5:6, 6:5, 7:4, 8:3, 9:2, 10:1, 11:0, 12:0 };
        
        function initTable() {
            let savedData = JSON.parse(localStorage.getItem('ff_pro_data')) || [];
            document.getElementById('inputSesi').value = localStorage.getItem('ff_pro_sesi') || "HASIL SESI";
            const mainContainer = document.getElementById('teamRows');
            const inputContainer = document.querySelector('#inputTableBody tbody');
            
            mainContainer.innerHTML = "";
            inputContainer.innerHTML = "";

            let rankOptions = `<option value="">-</option>`;
            for(let r=1; r<=12; r++) rankOptions += `<option value="${r}">#${r}</option>`;

            for (let i = 0; i < 12; i++) {
                let d = savedData[i] || { name: "", m1:{p:"",k:""}, m2:{p:"",k:""}, m3:{p:"",k:""} };
                
                let trMain = document.createElement('tr');
                trMain.innerHTML = `
                    <td class="td-name"><input type="text" value="${d.name}" class="input-name" placeholder="..." oninput="updateInputTableNames(); update()"></td>
                    <td><input type="text" value="${d.m1.p}" class="input-score m1-p" onchange="update()"></td>
                    <td><input type="text" value="${d.m1.k}" class="input-score input-kill m1-k" onchange="autoSumDigits(this)"></td>
                    <td class="td-readonly m1-pt">0</td>
                    <td><input type="text" value="${d.m2.p}" class="input-score m2-p" onchange="update()"></td>
                    <td><input type="text" value="${d.m2.k}" class="input-score input-kill m2-k" onchange="autoSumDigits(this)"></td>
                    <td class="td-readonly m2-pt">0</td>
                    <td><input type="text" value="${d.m3.p}" class="input-score m3-p" onchange="update()"></td>
                    <td><input type="text" value="${d.m3.k}" class="input-score input-kill m3-k" onchange="autoSumDigits(this)"></td>
                    <td class="td-readonly m3-pt">0</td>
                    <td class="td-readonly total-col total-pt">0</td>
                    <td class="td-readonly rank-col rank-cell"></td>
                `;
                mainContainer.appendChild(trMain);

                let trInput = document.createElement('tr');
                trInput.innerHTML = `
                    <td class="input-panel-name" style="border:1px solid #222; padding:5px;">${d.name || "-"}</td>
                    <td style="border:1px solid #222; padding:5px;"><select class="select-rank input-panel-rank">${rankOptions}</select></td>
                    <td style="border:1px solid #222; padding:5px;"><input type="text" class="input-score input-kill input-panel-kl" placeholder="111..." onchange="autoSumDigits(this, false)"></td>
                `;
                inputContainer.appendChild(trInput);
            }
            update();
        }

        function extractNames() {
            let rawText = document.getElementById('rawText').value.split('\n');
            let names = [];
            for(let line of rawText) {
                let text = line.trim();
                if(text !== '') {
                    text = text.replace(/^\d+[\.\s\-]+/, '');
                    text = text.replace(/\(\d+\)/g, '');
                    text = text.replace(/\d+/g, (match) => match.length > 7 ? match.substring(0, 7) : match);
                    text = text.replace(/[\u2705\u274E\u2702\u2714\u2716]/g, '');
                    let cleanName = text.replace(/\s+/g, ' ').trim().toUpperCase();
                    if(cleanName) names.push(cleanName);
                }
            }
            let inputs = document.querySelectorAll('.input-name');
            inputs.forEach((inp, i) => { if(names[i]) inp.value = names[i]; });
            updateInputTableNames();
            update();
        }

        function updateInputTableNames() {
            let mainNames = document.querySelectorAll('.input-name');
            let panelNames = document.querySelectorAll('.input-panel-name');
            mainNames.forEach((n, i) => panelNames[i].innerText = n.value || "-");
        }

        function sendToMainTable() {
            let match = document.getElementById('targetMatch').value;
            let inputRows = document.querySelectorAll('#inputTableBody tbody tr');
            let mainRows = document.querySelectorAll('#teamRows tr');
            for(let i=0; i<12; i++) {
                let r = inputRows[i].querySelector('.input-panel-rank').value;
                let k = inputRows[i].querySelector('.input-panel-kl').value;
                if(r !== "" || k !== "") {
                    mainRows[i].querySelector(`.m${match}-p`).value = r;
                    mainRows[i].querySelector(`.m${match}-k`).value = k;
                }
                inputRows[i].querySelector('.input-panel-rank').value = "";
                inputRows[i].querySelector('.input-panel-kl').value = "";
            }
            update();
            alert("Data Match " + match + " Masuk!");
        }

        function autoSumDigits(input, triggerUpdate = true) {
            let val = input.value.toString();
            if (val.length > 0 && !isNaN(val)) {
                let sum = 0;
                for (let i = 0; i < val.length; i++) {
                    let num = parseInt(val[i]);
                    if (!isNaN(num)) sum += num;
                }
                input.value = sum;
            }
            if(triggerUpdate) update();
        }

        function update() {
            let rows = document.querySelectorAll('#teamRows tr');
            let dataList = [];
            rows.forEach(row => {
                let tPt = 0, tKl = 0;
                let name = row.querySelector('.input-name').value;
                for (let m=1; m<=3; m++) {
                    let p = parseInt(row.querySelector(`.m${m}-p`).value) || 0;
                    let k = parseInt(row.querySelector(`.m${m}-k`).value) || 0;
                    let pt = (pointSystem[p] || 0) + k;
                    row.querySelector(`.m${m}-pt`).innerText = pt;
                    tPt += pt; tKl += k;
                }
                row.querySelector('.total-pt').innerText = tPt;
                dataList.push({ name: name || "-", pts: tPt, kls: tKl, el: row });
            });

            let sorted = [...dataList].sort((a,b) => b.pts - a.pts || b.kls - a.kls);
            dataList.forEach(t => {
                let rCell = t.el.querySelector('.rank-cell');
                let rank = sorted.findIndex(x => x === t) + 1;
                rCell.innerText = rank <= 3 ? rank : "";
                rCell.className = "td-readonly rank-col rank-cell " + (rank==1?'gold':rank==2?'silver':rank==3?'bronze':'');
            });

            if(sorted.length > 0) {
                document.getElementById('s1').innerText = sorted[0].name;
                document.getElementById('s2').innerText = sorted[1].name;
                document.getElementById('s3').innerText = sorted[2].name;
                let mk = [...dataList].sort((a,b) => b.kls - a.kls)[0];
                document.getElementById('smk').innerText = mk.name + " (" + mk.kls + ")";
            }
            saveData();
        }

        function saveData() {
            let arr = [];
            document.querySelectorAll('#teamRows tr').forEach(row => {
                arr.push({
                    name: row.querySelector('.input-name').value,
                    m1: { p: row.querySelector('.m1-p').value, k: row.querySelector('.m1-k').value },
                    m2: { p: row.querySelector('.m2-p').value, k: row.querySelector('.m2-k').value },
                    m3: { p: row.querySelector('.m3-p').value, k: row.querySelector('.m3-k').value }
                });
            });
            localStorage.setItem('ff_pro_data', JSON.stringify(arr));
            localStorage.setItem('ff_pro_sesi', document.getElementById('inputSesi').value);
        }

        function resetAllData() {
            if(confirm("Hapus SEMUA data? (Tim & Skor)")) { localStorage.removeItem('ff_pro_data'); initTable(); }
        }

        window.onload = initTable;
    </script>
</body>
</html>
